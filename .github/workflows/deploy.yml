name: Deploy Academy to 20i

# Publishes the static site (the contents of public/) to 20i over FTP
# whenever you push a change to those files on main.

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}   # also lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload public/ to 20i via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: public_html/
